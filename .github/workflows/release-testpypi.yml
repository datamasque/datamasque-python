name: Release (TestPyPI)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build from'
        required: true
        default: 'main'
      dev_version:
        description: >-
          Optional PEP 440 pre/dev version override (e.g. 1.1.0.dev1, 1.1.0a2, 1.1.0rc1).
          Leave blank to use the version in pyproject.toml as-is.
        required: false
        default: ''

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Apply dev_version override
        if: inputs.dev_version != ''
        run: |
          VERSION="${{ inputs.dev_version }}"
          # Reject anything that isn't a pre-release / dev version — final releases must go through release.yml.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc|\.dev)[0-9]+$'; then
            echo "::error::dev_version '${VERSION}' is not a PEP 440 pre/dev version (must end in aN, bN, rcN, or .devN)"
            exit 1
          fi
          uv run python -c "
          import re, pathlib
          path = pathlib.Path('pyproject.toml')
          text = path.read_text()
          new = re.sub(r'^version\s*=\s*\".*\"', 'version = \"${VERSION}\"', text, count=1, flags=re.M)
          if new == text:
              raise SystemExit('Failed to locate version line in pyproject.toml')
          path.write_text(new)
          "

      - name: Show package version
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          echo "Publishing version: ${VERSION} (from ref ${{ inputs.ref }})"
          echo "::notice title=TestPyPI version::${VERSION} from ${{ inputs.ref }}"

      - name: Build
        run: uv build

      - name: Validate distributions
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist-testpypi
          path: dist/
          retention-days: 7

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/datamasque-python
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist-testpypi
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
